{{define "content"}}
<style>
    .submit-btn {
        background: #28a745;
        color: white;
        font-weight: bold;
        padding: 10px 18px;
        font-size: 15px;
    }

    button {
        padding: 8px 14px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
    }
</style>

<div style="margin-left: 8rem; margin-right: 8rem; width: 40%;">

    <form style="margin: 20px;" action="/new/problem" method="POST">
        <h2>Create Problem</h2>
        <label for="title">Problem Name <span style="color: red;">*</span></label>
        <input type="text" name="title" id="title" required><br><br>

        <div style="display: flex; justify-content: right;">
            <button type="submit" class="submit-btn">Create Problem</button>
        </div>
    </form>
</div>

{{end}}
