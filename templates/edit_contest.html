{{define "content"}}

<style>
    .tabs-nav {
        display: flex;
        background-color: #f4f6f8;
        border: 1px solid #d1d5db;
        border-bottom: none;
    }

    .tab-btn {
        border-radius: 0px;
        background: none;
        border: none;
        padding: 12px 20px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        color: #738f93;
        transition: all 0.2s ease;
        outline: none;
        position: relative;
        border-left: 1px solid transparent;
        border-right: 1px solid transparent;
    }

    .tab-btn.active {
        background-color: #ffffff;
        color: #2c3e50;
        border-left: 1px solid #d1d5db;
        border-right: 1px solid #d1d5db;
        margin-bottom: -1px;
        z-index: 2;
    }

    .tab-btn.active::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background-color: #34495e;
    }

    .content-container {
        border: 1px solid #d1d5db;
        background: #fff;
        min-height: 200px;
        border-radius: 0 0 4px 4px;
    }

    .tab-content {
        display: none;
    }

    .tab-content.active {
        display: block;
        animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(5px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    label {
        font-weight: 600;
    }

    textarea {
        resize: vertical;
    }

    fieldset {
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 15px;
        margin-bottom: 15px;
        background: #fafafa;
    }

    legend {
        font-weight: bold;
    }

    button {
        padding: 8px 14px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
    }

    .add-btn {
        background: #2d8cff;
        color: white;
    }

    .remove-btn {
        background: #ff4d4f;
        color: white;
        margin-top: 8px;
    }

    .submit-btn {
        background: #28a745;
        color: white;
        font-weight: bold;
        padding: 10px 18px;
    }

    .tasks-layout {
        display: flex;
        gap: 16px;
        padding: 16px 0;
    }

    .tasks-panel {
        flex: 1;
        min-width: 0;
    }

    .tasks-panel-label {
        font-size: 13px;
        font-weight: 600;
        color: #555;
        margin-bottom: 8px;
    }

    .tasks-list {
        border: 1px solid #d1d5db;
        /* border-radius: 6px; */
        min-height: 220px;
        background: #f9f9f9;
    }

    .problem-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        border-bottom: 1px solid #e5e7eb;
        font-size: 14px;
        background: #fff;
        cursor: pointer;
        transition: background 0.15s;
    }

    .problem-item:last-child {
        border-bottom: none;
    }

    .problem-item:hover {
        background: #f4f6f8;
    }

    .problem-id {
        font-size: 12px;
        color: #888;
        font-family: monospace;
        min-width: 48px;
    }

    .problem-title {
        flex: 1;
    }

    .add-icon {
        color: #28a745;
        font-size: 18px;
        line-height: 1;
    }

    .drag-handle {
        cursor: grab;
        color: #aaa;
        font-size: 14px;
        user-select: none;
    }

    .remove-icon {
        color: #ff4d4f;
        cursor: pointer;
        font-size: 15px;
        line-height: 1;
    }

    .order-badge {
        font-size: 12px;
        font-weight: 600;
        min-width: 20px;
        height: 20px;
        background: #f0f0f0;
        border: 1px solid #ddd;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #555;
    }

    .drag-over {
        background: #e8f4ff !important;
    }

    .empty-hint {
        padding: 24px;
        text-align: center;
        font-size: 13px;
        color: #aaa;
    }

    .score-input {
        width: 64px;
        padding: 2px 6px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 0.8rem;
        text-align: center;
        margin-left: auto;
        /* pushes it to the right before the ✕ */
        flex-shrink: 0;
    }

    .score-input:focus {
        outline: none;
        border-color: #4a90e2;
    }
</style>

<div style="margin: 0 8rem; display: flex; flex-direction: column; align-items: center;">
    <div class="tabs-nav" style="width: 100%;">
        <button style="margin-left: 1rem;" class="tab-btn active" onclick="openTab(event, 'details')">Details</button>
        <button class="tab-btn" onclick="openTab(event, 'tasks')">Tasks</button>
        <button class="tab-btn" onclick="openTab(event, 'moderators')">Moderators</button>
        <button class="tab-btn" onclick="openTab(event, 'announcements')">Announcement</button>
    </div>

    <div class="content-container" style="width: 100%;">
        <form style="margin: 20px;" action="/edit/contest?id={{.ID}}" method="POST">
            <div id="details" class="tab-content active" style="width: 50%;">
                <label for="title">Contest Name <span style="color: red;">*</span></label>
                <input type="text" name="title" id="title" value="{{.Ptitle}}" required><br><br>

                <!-- 
                title
                start
                end
                 


                 -->

                <div style="width: 50%;">
                    <label>Start Time <span style="color: red;">*</span></label>
                    <span id="tz_display" style="margin-left:10px; color:#666; font-size:13px;"></span><br>
                    <input type="hidden" name="timezone" id="timezone">
                    <input type="datetime-local" name="start" id="start" required><br><br>

                    <label>End Time <span style="color: red;">*</span></label><br>
                    <input type="datetime-local" name="end" id="end" required>
                    <div id="time-error" style="color:red; font-size:13px; margin-top:6px;"></div>
                </div>

                <div style="display: flex; justify-content: right; margin-top: 16px;">
                    <button type="submit" class="submit-btn" id="save-btn" onclick="return validateTimes()">Save
                        Contest</button>
                </div>
            </div>

            <div id="tasks" class="tab-content">
                <div style="display: flex; gap: 10px;">
                    <div class="tasks-panel">
                        <div class="tasks-panel-label">Available problems</div>

                        <div style="position: relative; margin-bottom: 8px;">
                            <input type="text" id="problem-search" placeholder="Search by ID or name…"
                                autocomplete="off" style="width: 100%; box-sizing: border-box;">
                            <div id="problem-dropdown"
                                style="display:none; height: 10rem; position:absolute; top:100%; left:0; right:0; z-index:100; background:var(--color-background-primary); border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); max-height:260px; overflow-y:auto; margin-top:2px;">
                            </div>
                        </div>
                    </div>

                    <div class="tasks-panel">
                        <div class="tasks-panel-label">
                            Selected problems
                            <span id="selected-count" style="font-weight:400; color:#888;">(0)</span>
                        </div>
                        <div class="tasks-list" id="selected-list" ondragover="onTaskDragOver(event)"
                            ondrop="onTaskDrop(event)">
                            <div class="empty-hint" id="tasks-empty-hint">Search and add problems from above</div>
                            {{range .SelectedProblems}}
                            <div class="problem-item" data-id="{{.ID}}" data-title="{{.Title}}" data-score="{{.Score}}">
                                <span class="drag-handle" title="Drag to reorder">⠿</span>
                                <span class="order-badge">?</span>
                                <span class="problem-id">#{{.ID}}</span>
                                <span class="problem-title">{{.Title}}</span>
                                <input type="number" class="score-input" name="problem_scores" value="{{.Score}}"
                                    min="0" placeholder="1000" title="Score">
                                <span class="remove-icon" title="Remove">✕</span>
                                <input type="hidden" name="problem_ids" value="{{.ID}}">
                            </div>
                            {{end}}
                        </div>
                    </div>
                </div>
                <div style="display: flex; justify-content: right; margin-top: 16px;">
                    <button type="submit" class="submit-btn" id="save-btn" onclick="return validateTimes()">Save
                        Contest</button>
                </div>
            </div>

            <div id="moderators" class="tab-content">
                <div style="display: flex; justify-content: right;">
                    <button type="submit" class="submit-btn">Save Problem</button>
                </div>
            </div>
        </form>

        <div style="margin: 20px;" id="announcements" class="tab-content">
            <form action="/announcement" method="post">
                <label>Subject</label>
                <input type="text" name="subject" required><br><br>
                <label>Message</label>
                <textarea name="announcement" style="height: 20rem;"></textarea>
                <div style="display: flex; justify-content: right;">
                    <button type="submit" class="submit-btn">Post</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // ── Tab switching ──────────────────────────────────────────────
    function openTab(evt, tabName) {
        document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }


    // ── Time setup ─────────────────────────────────────────────────
    // Go sends unix milliseconds — new Date(ms) always parses correctly
    const startMs = parseInt("{{.Start}}");
    const endMs = parseInt("{{.End}}");

    // ms → "YYYY-MM-DDTHH:MM" in browser local time
    function msToLocalInput(ms) {
        const d = new Date(ms);
        const pad = n => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    // datetime-local string → Date (browser treats it as local time)
    function localInputToDate(val) {
        return new Date(val);
    }

    // Date → datetime-local input string (local time)
    function dateToLocalInput(d) {
        const pad = n => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    const startInput = document.getElementById("start");
    const endInput = document.getElementById("end");
    const tzDisplay = document.getElementById("tz_display");
    const tzHidden = document.getElementById("timezone");
    const errorDiv = document.getElementById("time-error");

    // Show browser timezone
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    tzDisplay.textContent = `(${tz})`;
    tzHidden.value = tz;

    // Populate inputs — converted to browser local time
    startInput.value = msToLocalInput(startMs);
    endInput.value = msToLocalInput(endMs);

    // Contest state
    const now = new Date();
    const startDate = new Date(startMs);
    const endDate = new Date(endMs);

    const hasStarted = now >= startDate;
    const hasEnded = now >= endDate;

    // Rule 4: disable start if already started
    if (hasStarted) {
        startInput.disabled = true;
        startInput.title = "Contest has already started";
    }

    // Rule 5: disable end if already ended
    if (hasEnded) {
        endInput.disabled = true;
        endInput.title = "Contest has already ended";
    }

    // Rule 6: start must be at least now+10min
    if (!hasStarted) {
        const minStart = new Date(now.getTime() + 10 * 60 * 1000);
        startInput.min = dateToLocalInput(minStart);
    }

    // Rules 7 & 8: end min = max(now+5min, start+30min)
    function updateEndMin() {
        const minFromNow = new Date(now.getTime() + 5 * 60 * 1000);
        const startVal = localInputToDate(startInput.value);
        const minFromStart = new Date(startVal.getTime() + 30 * 60 * 1000);
        const minEnd = minFromStart > minFromNow ? minFromStart : minFromNow;

        endInput.min = dateToLocalInput(minEnd);

        // Auto-correct if current end value is below minimum
        if (endInput.value && localInputToDate(endInput.value) < minEnd) {
            endInput.value = dateToLocalInput(minEnd);
        }
    }

    if (!hasEnded) {
        updateEndMin();
        startInput.addEventListener("change", updateEndMin);
    }

    // ── Validation on submit ───────────────────────────────────────
    function validateTimes() {
        errorDiv.textContent = "";
        const now = new Date();

        if (!startInput.disabled) {
            const s = localInputToDate(startInput.value);
            if (s < new Date(now.getTime() + 10 * 60 * 1000)) {
                errorDiv.textContent = "Start time must be at least 10 minutes from now.";
                return false;
            }
        }

        if (!endInput.disabled) {
            const s = localInputToDate(startInput.value);
            const e = localInputToDate(endInput.value);
            if (e < new Date(now.getTime() + 5 * 60 * 1000)) {
                errorDiv.textContent = "End time must be at least 5 minutes from now.";
                return false;
            }
            if (e < new Date(s.getTime() + 30 * 60 * 1000)) {
                errorDiv.textContent = "End time must be at least 30 minutes after start time.";
                return false;
            }
        }

        return true;
    }


    // ── Tasks tab ────────────────────────────────────────────────

    let taskDragSrc = null;

    // All available problems injected from Go template into JS
    const ALL_PROBLEMS = [
        {{ range .AvailableProblems }}
    { id: "{{.ID}}", title: {{.Title | js }} },
    {{ end }}
];

    // Track which IDs are already selected so they don't appear in search
    const selectedIds = new Set(
        [...document.querySelectorAll('#selected-list .problem-item')].map(el => el.dataset.id)
    );

    // ── Search / dropdown ──────────────────────────────────────

    const searchInput = document.getElementById('problem-search');
    const dropdown = document.getElementById('problem-dropdown');

    function buildDropdown(query) {
        const q = query.trim().toLowerCase();
        const matches = ALL_PROBLEMS.filter(p => {
            if (selectedIds.has(String(p.id))) return false;
            if (!q) return true;
            return String(p.id).includes(q) || p.title.toLowerCase().includes(q);
        });

        dropdown.innerHTML = '';

        if (!matches.length) {
            dropdown.innerHTML = '<div style="padding:10px 12px; font-size:13px; color:var(--color-text-tertiary);">No problems found</div>';
            dropdown.style.display = 'block';
            return;
        }

        matches.slice(0, 50).forEach(p => {
            const row = document.createElement('div');
            row.style.cssText = 'display:flex; align-items:center; gap:8px; padding:8px 12px; cursor:pointer; font-size:13px;';
            row.innerHTML = `
            <span style="color:var(--color-text-secondary); flex-shrink:0;">#${p.id}</span>
            <span style="flex:1; color:var(--color-text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${p.title}</span>
            <span style="font-size:16px; color:var(--color-text-info); flex-shrink:0; line-height:1;">＋</span>
        `;
            row.addEventListener('mouseenter', () => row.style.background = 'var(--color-background-secondary)');
            row.addEventListener('mouseleave', () => row.style.background = '');
            row.addEventListener('mousedown', e => {
                e.preventDefault(); // keep focus on input
                addTaskToSelected(p.id, p.title);
                searchInput.value = '';
                dropdown.style.display = 'none';
            });
            dropdown.appendChild(row);
        });

        dropdown.style.display = 'block';
    }

    searchInput.addEventListener('input', () => buildDropdown(searchInput.value));
    searchInput.addEventListener('focus', () => buildDropdown(searchInput.value));

    document.addEventListener('click', e => {
        if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.style.display = 'none';
        }
    });

    searchInput.addEventListener('keydown', e => {
        if (e.key === 'Escape') { dropdown.style.display = 'none'; searchInput.blur(); }
    });

    // ── Selected list ─────────────────────────────────────────

    function refreshTaskOrder() {
        const items = document.querySelectorAll('#selected-list .problem-item');
        items.forEach((el, i) => {
            el.querySelector('.order-badge').textContent = String.fromCharCode(65 + i);
        });
        document.getElementById('selected-count').textContent = '(' + items.length + ')';
        document.getElementById('tasks-empty-hint').style.display = items.length ? 'none' : 'block';
    }

    function makeDraggable(item) {
        item.draggable = true;
        item.addEventListener('dragstart', e => {
            taskDragSrc = item;
            e.dataTransfer.effectAllowed = 'move';
        });
        item.addEventListener('dragend', () => {
            document.querySelectorAll('#selected-list .problem-item').forEach(el => el.classList.remove('drag-over'));
        });
        item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('drag-over'); });
        item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
        item.addEventListener('drop', e => {
            e.preventDefault(); e.stopPropagation();
            item.classList.remove('drag-over');
            if (taskDragSrc && taskDragSrc !== item) {
                const parent = item.parentNode;
                const all = [...parent.querySelectorAll('.problem-item')];
                const srcIdx = all.indexOf(taskDragSrc);
                const tgtIdx = all.indexOf(item);
                if (srcIdx < tgtIdx) parent.insertBefore(taskDragSrc, item.nextSibling);
                else parent.insertBefore(taskDragSrc, item);
                refreshTaskOrder();
            }
        });
    }

    function addTaskToSelected(id, title, score) {
        selectedIds.add(String(id));

        const sel = document.getElementById('selected-list');
        const item = document.createElement('div');
        item.className = 'problem-item';
        item.dataset.id = id;
        item.dataset.title = title;

        const scoreVal = (score !== undefined && score !== null && score !== '') ? score : 1000;

        item.innerHTML = `
        <span class="drag-handle" title="Drag to reorder">⠿</span>
        <span class="order-badge">1</span>
        <span class="problem-id">#${id}</span>
        <span class="problem-title">${title}</span>
        <input type="number" class="score-input" name="problem_scores"
               value="${scoreVal}" min="0" placeholder="1000" title="Score">
        <span class="remove-icon" title="Remove">✕</span>
        <input type="hidden" name="problem_ids" value="${id}">
    `;
        item.querySelector('.remove-icon').addEventListener('click', () => removeTaskFromSelected(id, title));
        makeDraggable(item);
        sel.appendChild(item);
        refreshTaskOrder();
    }

    function removeTaskFromSelected(id, title) {
        selectedIds.delete(String(id));
        const item = document.querySelector(`#selected-list [data-id="${id}"]`);
        if (item) item.remove();
        refreshTaskOrder();
        // refresh dropdown in case it's open
        if (dropdown.style.display !== 'none') buildDropdown(searchInput.value);
    }

    function onTaskDragOver(e) { e.preventDefault(); }
    function onTaskDrop(e) { e.preventDefault(); }

    // Wire up pre-selected problems from server
    document.querySelectorAll('#selected-list .problem-item').forEach(el => {
        el.querySelector('.remove-icon').addEventListener('click', () =>
            removeTaskFromSelected(el.dataset.id, el.dataset.title)
        );
        makeDraggable(el);
    });

    refreshTaskOrder();


</script>

{{end}}
