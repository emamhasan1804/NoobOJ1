{{define "content"}}

<div style="display: flex; justify-content: center; align-items: center; flex-direction: column;">
    <h2>Are you sure you want to delete this problem?</h2>
    <div>
        <form method="post" action="/delete/problem?id={{.ID}}" style="display:inline;">
            <input type="submit" value="Delete"
                style="width:130px; padding:16px 0; font-weight:600; font-size:18px; color:white; background-color:red; border:none; cursor:pointer;">
        </form>

        <button type="button" onclick="window.location.href='/administration'"
            style="width:130px; padding:16px 0; font-weight:600; font-size:18px; color:white; background-color:green; border:none; cursor:pointer;">
            Cancel
        </button>
    </div>
</div>
{{end}}
